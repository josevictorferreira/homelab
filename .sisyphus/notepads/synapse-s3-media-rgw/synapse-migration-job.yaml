apiVersion: batch/v1
kind: Job
metadata:
  name: synapse-media-migration
  namespace: apps
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: ghcr.io/element-hq/synapse:v1.146.0
        command:
        - sh
        - -c
        - |
          set -e
          echo "Installing s3-storage-provider..."
          pip install --no-cache-dir --target /modules synapse-s3-storage-provider
          
          mkdir -p /modules
          cat > /modules/aws-config << 'AWSEOF'
          [default]
          s3 =
            addressing_style = path
          AWSEOF
          
          export PYTHONPATH=/modules
          export AWS_CONFIG_FILE=/modules/aws-config
          export AWS_EC2_METADATA_DISABLED=true
          
          echo "Environment configured. PYTHONPATH=$PYTHONPATH"
          echo "AWS_ACCESS_KEY_ID is set: $(test -n "$AWS_ACCESS_KEY_ID" && echo 'yes' || echo 'no')"
          echo "AWS_SECRET_ACCESS_KEY is set: $(test -n "$AWS_SECRET_ACCESS_KEY" && echo 'yes' || echo 'no')"
          
          echo "Checking local media store..."
          ls -la /synapse/data/media/ || echo "Media directory not found"
          find /synapse/data/media -type f 2>/dev/null | head -20 || echo "No files found"
          
          echo ""
          echo "=== Running s3_media_upload update ==="
          python -m s3_storage_provider.s3_media_upload update /synapse/data/media 0
          
          echo ""
          echo "=== Running s3_media_upload upload --delete ==="
          python -m s3_storage_provider.s3_media_upload upload /synapse/data/media matrix-synapse-media --delete
          
          echo ""
          echo "=== Migration complete ==="
          echo "Remaining local files:"
          find /synapse/data/media -type f 2>/dev/null | wc -l
        volumeMounts:
        - name: media
          mountPath: /synapse/data
        - name: modules
          mountPath: /modules
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: matrix-synapse-media
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: matrix-synapse-media
              key: AWS_SECRET_ACCESS_KEY
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: synapse-matrix-synapse
      - name: modules
        emptyDir: {}
  backoffLimit: 3
