---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: personal-finance-dashboard
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: personal-finance-dashboard
  url: ssh://git@github.com/josevictorferreira/personal-finance-dashboard
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: personal-finance-dashboard
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./.k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: personal-finance-dashboard
