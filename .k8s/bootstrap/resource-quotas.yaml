apiVersion: v1
kind: LimitRange
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: default-limits
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: '2'
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: default-limits
spec:
  limits:
    - default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: '1'
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
      type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: apps
spec:
  hard:
    limits.cpu: '16'
    limits.memory: 32Gi
    requests.cpu: '8'
    requests.memory: 16Gi
---
apiVersion: v1
