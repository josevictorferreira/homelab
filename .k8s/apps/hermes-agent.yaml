apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: dashboard
  name: hermes-agent-dashboard
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: dashboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: dashboard
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - umask 0002; exec /opt/hermes/.venv/bin/hermes dashboard --host 127.0.0.1
              --port 9119 --no-open --insecure
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: HERMES_HOME
              value: /opt/data
            - name: TZ
              value: America/Sao_Paulo
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: docker.io/nousresearch/hermes-agent:v2026.7.1@sha256:5fc62636d9f88dd1edde26aabfdcbac3060af559104d8cbbf5736b579828becf
          imagePullPolicy: IfNotPresent
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            tcpSocket:
              port: 9119
          name: dashboard
          ports:
            - containerPort: 9119
              name: http
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            tcpSocket:
              port: 9119
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 2002
            runAsNonRoot: true
            runAsUser: 10000
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /shared/mel-dynamica
              name: hermes-data
              subPath: mel-dynamica
            - mountPath: /shared/personal-finances
              name: hermes-data
              subPath: personal-finances
            - mountPath: /shared/images
              name: hermes-data
              subPath: images
            - mountPath: /opt/hermes/scripts/whatsapp-bridge/node_modules
              name: hermes-data
              subPath: whatsapp-bridge-node_modules
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      securityContext:
        supplementalGroups:
          - 100
      terminationGracePeriodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
