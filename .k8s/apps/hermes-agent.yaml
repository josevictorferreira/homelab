        - command:
            - /bin/sh
            - -c
            - "# Plugins installed via the dashboard land in /opt/data/plugins\n#\
              \ (its HERMES_HOME is /opt/data), but per-profile agents scan\n# $HERMES_HOME/plugins\
              \ = /opt/data/profiles/<p>/plugins. Link the\n# shared plugins into\
              \ every profile so dashboard-installed\n# backends (e.g. omniroute)\
              \ are discovered by each agent.\n# (config still gates which ones actually\
              \ load via plugins.enabled.)\nif [ -d /opt/data/plugins ]; then\n  for\
              \ d in /opt/data/profiles/*/; do\n    [ -d \"$d\" ] || continue\n  \
              \  mkdir -p \"$d/plugins\"\n    for p in /opt/data/plugins/*/; do\n\
              \      [ -d \"$p\" ] || continue\n      ln -sfn \"$p\" \"$d/plugins/$(basename\
              \ \"$p\")\"\n    done\n  done\nfi\n# Profile HOMEs: hermes creates each\
              \ /opt/data/profiles/<p>\n# as 0700 owned by the runtime uid, which\
              \ locks the SMB client\n# (authenticated as GID 2002, not the dir owner)\
              \ out of that\n# profile's folder — the cause of \"sometimes I lose\
              \ access\".\n# Normalize ownership + group access so every profile is\n\
              # reachable. Only touches wrong entries, so it stays fast.\nfor d in\
              \ /opt/data/profiles/*/; do\n  [ -d \"$d\" ] || continue\n  find \"\
              $d\" ! -user 10000 -exec chown 10000 {} + 2>/dev/null || true\n  find\
              \ \"$d\" ! -group 2002 -exec chgrp 2002 {} + 2>/dev/null || true\n \
              \ find \"$d\" -type d ! -perm -2070 -exec chmod g+rwxs {} + 2>/dev/null\
              \ || true\n  find \"$d\" -type f ! -perm -060 -exec chmod g+rw {} +\
              \ 2>/dev/null || true\ndone\n# Guarantee read/write for everything in\
              \ the unified \"homelab\" group\n# (GID 2002 — the agents' primary gid\
              \ and the host user's group, and\n# what other pods join via supplementalGroups).\
              \ setgid on dirs so new\n# entries inherit the group; group-writable.\
              \ Only touches wrong\n# entries, so it stays fast on large trees.\n\
              for d in /shared/*/; do\n  [ -d \"$d\" ] || continue\n  find \"$d\"\
              \ ! -group 2002 -exec chgrp 2002 {} + 2>/dev/null || true\n  find \"\
              $d\" -type d ! -perm -2070 -exec chmod g+rwxs {} + 2>/dev/null || true\n\
              \  find \"$d\" -type f ! -perm -060 -exec chmod g+rw {} + 2>/dev/null\
              \ || true\ndone\n"
