---
apiVersion: v1
data:
  hermes: '#!/bin/sh

    exec gosu 10000:10000 /opt/hermes/.venv/bin/hermes "$@"

    '
kind: ConfigMap
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-cli-wrapper
  namespace: apps
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ports:
    - name: http
      port: 9119
      protocol: TCP
      targetPort: 9119
  selector:
    app: hermes-agent
    component: dashboard
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hermes.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: hermes-agent-dashboard
                port:
                  number: 9119
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hermes.josevictor.me
      secretName: wildcard-tls
