apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: gateway
  name: hermes-agent-gateway
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: gateway
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - "                # Group-writable by default so any hermes process (and\
              \ the\n                # host user, all in GID 100) can always overwrite\
              \ shared files.\n                umask 0002\n                # Bootstrap\
              \ pip if not present\n                command -v pip >/dev/null 2>&1\
              \ || command -v pip3 >/dev/null 2>&1 || {\n                  python3\
              \ -c \"import urllib.request; exec(urllib.request.urlopen('https://bootstrap.pypa.io/get-pip.py').read())\"\
              \ --user -q 2>/dev/null || true\n                }\n               \
              \ # Bootstrap faster-whisper for audio transcription\n             \
              \   python3 -c \"import faster_whisper\" 2>/dev/null || {\n        \
              \          pip install --user -q faster-whisper 2>/dev/null || true\n\
              \                }\n                # Bootstrap Matrix dependencies\
              \ if not installed\n                python3 -c \"import mautrix\" 2>/dev/null\
              \ || {\n                  uv pip install mautrix asyncpg aiosqlite Markdown\
              \ aiohttp-socks 2>/dev/null || true\n                }\n           \
              \     # Bootstrap hindsight-client at the version the memory plugin\
              \ pins.\n                # The image bumps this pin on upgrade; the\
              \ user-site copy on the PVC\n                # persists the old version,\
              \ so install the exact pin when it drifts.\n                python3\
              \ -c \"import importlib.metadata as m, sys; sys.exit(0 if m.version('hindsight-client')\
              \ == '0.6.1' else 1)\" 2>/dev/null || {\n                  python3 -m\
              \ pip install --user --break-system-packages 'hindsight-client==0.6.1'\
              \ 2>/dev/null || true\n                }\n                # Bootstrap\
              \ kubectl if not present\n                command -v kubectl >/dev/null\
              \ 2>&1 || {\n                  python3 -c \"\nimport urllib.request,\
              \ os, stat, shutil\nurl = 'https://dl.k8s.io/release/v1.32.6/bin/linux/amd64/kubectl'\n\
              tmp = '/tmp/kubectl'\ndest = '/opt/data/.local/bin/kubectl'\nos.makedirs('/opt/data/.local/bin',\
              \ exist_ok=True)\nurllib.request.urlretrieve(url, tmp)\nos.chmod(tmp,\
              \ stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)\n\
              shutil.move(tmp, dest)\n        \" 2>/dev/null || true\n           \
              \     }\n                # Bootstrap WhatsApp bridge dependencies if\
              \ needed\n                if [ \"${WHATSAPP_ENABLED:-false}\" = \"true\"\
              \ ]; then\n                  if [ -d /opt/hermes/scripts/whatsapp-bridge\
              \ ] && [ ! -f /opt/hermes/scripts/whatsapp-bridge/node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                    mkdir -p /opt/data/whatsapp-bridge-node_modules\n\
              \                    if [ ! -f /opt/data/whatsapp-bridge-node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && cp -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && NODE_OPTIONS=\"--max-old-space-size=256\" npm install --production\
              \ --no-audit --maxsockets 1 --prefer-offline 2>/dev/null) || true\n\
              \                      (cd /opt/hermes/scripts/whatsapp-bridge && cp\
              \ -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n                    fi\n                    rm -rf /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \                    ln -s /opt/data/whatsapp-bridge-node_modules /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \                  fi\n                fi\n                  # Fix Baileys\
              \ 7.x syncFullHistory for incoming messages\n                  sed -i\
              \ 's/syncFullHistory: false/syncFullHistory: true/' /opt/hermes/scripts/whatsapp-bridge/bridge.js\
              \ 2>/dev/null || true\n\nexec hermes -p ted gateway run\n"
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: TZ
              value: America/Sao_Paulo
            - name: HERMES_MANAGED_DIR
              value: /opt/data/managed
            - name: HERMES_WRITE_SAFE_ROOT
              value: ''
            - name: XAI_API_KEY
              valueFrom:
