              \ exist_ok=True)\nurllib.request.urlretrieve(url, tmp)\nos.chmod(tmp,\
              \ stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)\n\
              shutil.move(tmp, dest)\n        \" 2>/dev/null || true\n           \
              \     }\n                # Bootstrap WhatsApp bridge dependencies if\
              \ needed\n                if [ \"${WHATSAPP_ENABLED:-false}\" = \"true\"\
              \ ]; then\n                  if [ -d /opt/hermes/scripts/whatsapp-bridge\
              \ ] && [ ! -f /opt/hermes/scripts/whatsapp-bridge/node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                    mkdir -p /opt/data/whatsapp-bridge-node_modules\n\
              \                    if [ ! -f /opt/data/whatsapp-bridge-node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && cp -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && NODE_OPTIONS=\"--max-old-space-size=256\" npm install --production\
