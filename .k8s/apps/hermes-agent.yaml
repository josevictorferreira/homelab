apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: dashboard
  name: hermes-agent-dashboard
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: dashboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: dashboard
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - exec /opt/hermes/.venv/bin/hermes dashboard --host 0.0.0.0 --port 9119
              --no-open --insecure
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: HERMES_HOME
              value: /opt/data
            - name: TZ
              value: America/Sao_Paulo
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: docker.io/nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          imagePullPolicy: IfNotPresent
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            tcpSocket:
              port: 9119
          name: dashboard
          ports:
            - containerPort: 9119
              name: http
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            tcpSocket:
              port: 9119
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - DAC_OVERRIDE
              drop:
                - ALL
            runAsUser: 0
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /shared/mel-dynamica
              name: hermes-data
              subPath: mel-dynamica
            - mountPath: /shared/personal-finances
              name: hermes-data
              subPath: personal-finances
            - mountPath: /opt/hermes/scripts/whatsapp-bridge/node_modules
              name: hermes-data
              subPath: whatsapp-bridge-node_modules
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      terminationGracePeriodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: gateway
  name: hermes-agent-gateway
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: gateway
