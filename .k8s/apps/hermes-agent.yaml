apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: dashboard
  name: hermes-agent-dashboard
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: dashboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: dashboard
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - umask 0002; exec /opt/hermes/.venv/bin/hermes dashboard --host 0.0.0.0
              --port 9119 --no-open --insecure
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: HERMES_HOME
              value: /opt/data
            - name: TZ
              value: America/Sao_Paulo
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: docker.io/nousresearch/hermes-agent:v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
          imagePullPolicy: IfNotPresent
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            tcpSocket:
              port: 9119
          name: dashboard
          ports:
            - containerPort: 9119
              name: http
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            tcpSocket:
              port: 9119
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 2002
            runAsNonRoot: true
            runAsUser: 10000
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /shared/mel-dynamica
              name: hermes-data
              subPath: mel-dynamica
            - mountPath: /shared/personal-finances
              name: hermes-data
              subPath: personal-finances
            - mountPath: /shared/images
              name: hermes-data
              subPath: images
            - mountPath: /opt/hermes/scripts/whatsapp-bridge/node_modules
              name: hermes-data
              subPath: whatsapp-bridge-node_modules
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      securityContext:
        supplementalGroups:
          - 100
      terminationGracePeriodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: gateway
  name: hermes-agent-gateway
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: gateway
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - "# Group-writable by default so any hermes process (and the\n# host\
              \ user, all in GID 100) can always overwrite shared files.\numask 0002\n\
              # Bootstrap pip if not present\ncommand -v pip >/dev/null 2>&1 || command\
              \ -v pip3 >/dev/null 2>&1 || {\n  python3 -c \"import urllib.request;\
              \ exec(urllib.request.urlopen('https://bootstrap.pypa.io/get-pip.py').read())\"\
              \ --user -q 2>/dev/null || true\n}\n# Bootstrap faster-whisper for audio\
              \ transcription\npython3 -c \"import faster_whisper\" 2>/dev/null ||\
              \ {\n  pip install --user -q faster-whisper 2>/dev/null || true\n}\n\
              # Bootstrap Matrix dependencies if not installed\npython3 -c \"import\
              \ mautrix\" 2>/dev/null || {\n  uv pip install mautrix asyncpg aiosqlite\
              \ Markdown aiohttp-socks 2>/dev/null || true\n}\n# Bootstrap hindsight-client\
              \ at the version the memory plugin pins.\n# The image bumps this pin\
              \ on upgrade; the user-site copy on the PVC\n# persists the old version,\
              \ so install the exact pin when it drifts.\npython3 -c \"import importlib.metadata\
              \ as m, sys; sys.exit(0 if m.version('hindsight-client') == '0.6.1'\
              \ else 1)\" 2>/dev/null || {\n  python3 -m pip install --user --break-system-packages\
              \ 'hindsight-client==0.6.1' 2>/dev/null || true\n}\n# Bootstrap kubectl\
              \ if not present\ncommand -v kubectl >/dev/null 2>&1 || {\n  python3\
              \ -c \"\nimport urllib.request, os, stat, shutil\nurl = 'https://dl.k8s.io/release/v1.32.6/bin/linux/amd64/kubectl'\n\
              tmp = '/tmp/kubectl'\ndest = '/opt/data/.local/bin/kubectl'\nos.makedirs('/opt/data/.local/bin',\
              \ exist_ok=True)\nurllib.request.urlretrieve(url, tmp)\nos.chmod(tmp,\
              \ stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)\n\
              shutil.move(tmp, dest)\n        \" 2>/dev/null || true\n}\n# Bootstrap\
              \ WhatsApp bridge dependencies (kira is the only WhatsApp profile;\n\
              # the bridge script is shared in the image so deps are installed once\
              \ here).\nif [ \"${WHATSAPP_BOOTSTRAP:-false}\" = \"true\" ]; then\n\
              \  if [ -d /opt/hermes/scripts/whatsapp-bridge ] && [ ! -f /opt/hermes/scripts/whatsapp-bridge/node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n    mkdir -p /opt/data/whatsapp-bridge-node_modules\n   \
              \ if [ ! -f /opt/data/whatsapp-bridge-node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n      (cd /opt/hermes/scripts/whatsapp-bridge && cp -r node_modules\
              \ /opt/data/whatsapp-bridge-node_modules 2>/dev/null) || true\n    \
              \  (cd /opt/hermes/scripts/whatsapp-bridge && NODE_OPTIONS=\"--max-old-space-size=256\"\
              \ npm install --production --no-audit --maxsockets 1 --prefer-offline\
              \ 2>/dev/null) || true\n      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && cp -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n    fi\n    rm -rf /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \    ln -s /opt/data/whatsapp-bridge-node_modules /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \  fi\nfi\n# Fix Baileys 7.x syncFullHistory for incoming messages\n\
              sed -i 's/syncFullHistory: false/syncFullHistory: true/' /opt/hermes/scripts/whatsapp-bridge/bridge.js\
              \ 2>/dev/null || true\n\nupsert_env() {\n  f=\"$1\"; k=\"$2\"; v=\"\
              $3\"\n  [ -n \"$v\" ] || return 0\n  mkdir -p \"$(dirname \"$f\")\"\n\
              \  touch \"$f\"\n  grep -v \"^${k}=\" \"$f\" > \"$f.tmp\" 2>/dev/null\
              \ || true\n  mv \"$f.tmp\" \"$f\"\n  printf '%s=%s\\n' \"$k\" \"$v\"\
              \ >> \"$f\"\n}\nPB=/opt/data/profiles\nupsert_env \"$PB/ted/.env\" \
              \  MATRIX_ACCESS_TOKEN \"${TED_MATRIX_TOKEN:-}\"\nupsert_env \"$PB/kira/.env\"\
              \  MATRIX_ACCESS_TOKEN \"${KIRA_MATRIX_TOKEN:-}\"\nupsert_env \"$PB/mel/.env\"\
              \   MATRIX_ACCESS_TOKEN \"${MEL_MATRIX_TOKEN:-}\"\nupsert_env \"$PB/spike/.env\"\
              \ MATRIX_ACCESS_TOKEN \"${SPIKE_MATRIX_TOKEN:-}\"\nupsert_env \"$PB/luna/.env\"\
              \  MATRIX_ACCESS_TOKEN \"${LUNA_MATRIX_TOKEN:-}\"\n# kira WhatsApp (bot\
              \ mode)\nupsert_env \"$PB/kira/.env\"  WHATSAPP_ENABLED       \"true\"\
              \nupsert_env \"$PB/kira/.env\"  WHATSAPP_MODE          \"bot\"\nupsert_env\
              \ \"$PB/kira/.env\"  WHATSAPP_DEBUG         \"true\"\nupsert_env \"\
              $PB/kira/.env\"  WHATSAPP_ALLOWED_USERS \"${KIRA_WHATSAPP_ALLOWED_USERS:-}\"\
              \n\n# Clear all per-profile secrets from the gateway PROCESS env. In\
              \ multiplex\n# each profile must resolve its token from its own .env\
              \ (written above);\n# leaving MATRIX_ACCESS_TOKEN in os.environ would\
              \ leak ted's token to the\n# default profile and collide as a duplicate\
              \ (platform, token) pair.\nunset MATRIX_ACCESS_TOKEN \\\n      TED_MATRIX_TOKEN\
              \ KIRA_MATRIX_TOKEN MEL_MATRIX_TOKEN \\\n      SPIKE_MATRIX_TOKEN LUNA_MATRIX_TOKEN\
              \ KIRA_WHATSAPP_ALLOWED_USERS\n# --no-supervise: run as the container's\
              \ main process (no s6 redirect);\n# multiplex is read from the default\
              \ profile config.yaml.\nexec hermes gateway run --no-supervise\n"
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: TZ
              value: America/Sao_Paulo
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_MANAGED_DIR
              value: /opt/data/managed
            - name: WHATSAPP_BOOTSTRAP
              value: 'true'
            - name: HERMES_WRITE_SAFE_ROOT
              value: ''
            - name: AGENT_BROWSER_ENGINE
              value: cdp
            - name: AGENT_BROWSER_ENDPOINT
              value: ws://cloakbrowser.apps.svc.cluster.local:9222
            - name: HINDSIGHT_MODE
              value: local_external
            - name: HINDSIGHT_API_URL
              value: http://hindsight-api.apps.svc.cluster.local:8888
            - name: HINDSIGHT_BANK_ID
              value: hermes
            - name: HINDSIGHT_BUDGET
              value: mid
            - name: HINDSIGHT_API_KEY
              value: dummy
            - name: HINDSIGHT_LLM_API_KEY
              value: dummy
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  key: GITHUB_TOKEN
                  name: hermes-agent-env
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  key: GH_TOKEN
                  name: hermes-agent-env
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin
            - name: PYTHONPATH
              value: /opt/data/.local/lib/python3.13/site-packages
            - name: PYTHONUSERBASE
              value: /opt/data/.local
            - name: PIP_USER
              value: 'true'
            - name: PIP_REQUIRE_VIRTUALENV
              value: 'false'
            - name: TED_MATRIX_TOKEN
              valueFrom:
                secretKeyRef:
                  key: MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
            - name: KIRA_MATRIX_TOKEN
              valueFrom:
                secretKeyRef:
                  key: HERMES_KIRA_MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
            - name: MEL_MATRIX_TOKEN
              valueFrom:
                secretKeyRef:
                  key: HERMES_MEL_MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
            - name: SPIKE_MATRIX_TOKEN
              valueFrom:
                secretKeyRef:
                  key: HERMES_SPIKE_MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
            - name: LUNA_MATRIX_TOKEN
              valueFrom:
                secretKeyRef:
                  key: HERMES_LUNA_MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
            - name: KIRA_WHATSAPP_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  key: HERMES_KIRA_WHATSAPP_ALLOWED_USERS
                  name: hermes-agent-env
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: docker.io/nousresearch/hermes-agent:v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
          imagePullPolicy: IfNotPresent
          name: gateway
          resources:
            limits:
              cpu: '2'
              memory: 3Gi
            requests:
              cpu: 250m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 2002
            runAsNonRoot: true
            runAsUser: 10000
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /shared/mel-dynamica
              name: hermes-data
              subPath: mel-dynamica
            - mountPath: /shared/personal-finances
              name: hermes-data
              subPath: personal-finances
            - mountPath: /shared/images
              name: hermes-data
              subPath: images
            - mountPath: /opt/hermes/scripts/whatsapp-bridge/node_modules
              name: hermes-data
              subPath: whatsapp-bridge-node_modules
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      initContainers:
        - command:
            - /bin/sh
            - -c
            - "# Profile HOMEs: hermes creates each /opt/data/profiles/<p>\n# as 0700\
              \ owned by the runtime uid, which locks the SMB client\n# (authenticated\
              \ as GID 2002, not the dir owner) out of that\n# profile's folder —\
              \ the cause of \"sometimes I lose access\".\n# Normalize ownership +\
              \ group access so every profile is\n# reachable. Only touches wrong\
              \ entries, so it stays fast.\nfor d in /opt/data/profiles/*/; do\n \
              \ [ -d \"$d\" ] || continue\n  find \"$d\" ! -user 10000 -exec chown\
              \ 10000 {} + 2>/dev/null || true\n  find \"$d\" ! -group 2002 -exec\
              \ chgrp 2002 {} + 2>/dev/null || true\n  find \"$d\" -type d ! -perm\
              \ -2070 -exec chmod g+rwxs {} + 2>/dev/null || true\n  find \"$d\" -type\
              \ f ! -perm -060 -exec chmod g+rw {} + 2>/dev/null || true\ndone\n#\
              \ Guarantee read/write for everything in the unified \"homelab\" group\n\
              # (GID 2002 — the agents' primary gid and the host user's group, and\n\
              # what other pods join via supplementalGroups). setgid on dirs so new\n\
              # entries inherit the group; group-writable. Only touches wrong\n# entries,\
              \ so it stays fast on large trees.\nfor d in /shared/*/; do\n  [ -d\
              \ \"$d\" ] || continue\n  find \"$d\" ! -group 2002 -exec chgrp 2002\
              \ {} + 2>/dev/null || true\n  find \"$d\" -type d ! -perm -2070 -exec\
              \ chmod g+rwxs {} + 2>/dev/null || true\n  find \"$d\" -type f ! -perm\
              \ -060 -exec chmod g+rw {} + 2>/dev/null || true\ndone\n"
          image: docker.io/nousresearch/hermes-agent:v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
          name: fix-profile-permissions
          securityContext:
            capabilities:
              add:
                - DAC_OVERRIDE
              drop: []
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /shared/mel-dynamica
              name: hermes-data
              subPath: mel-dynamica
            - mountPath: /shared/personal-finances
              name: hermes-data
              subPath: personal-finances
            - mountPath: /shared/images
              name: hermes-data
              subPath: images
            - mountPath: /opt/hermes/scripts/whatsapp-bridge/node_modules
              name: hermes-data
              subPath: whatsapp-bridge-node_modules
      securityContext:
        supplementalGroups:
          - 100
      terminationGracePeriodSeconds: 60
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
---
apiVersion: v1
data:
  hermes: "#!/bin/sh\nif [ \"$(id -u)\" = \"0\" ]; then\n  exec gosu 10000:2002 /opt/hermes/.venv/bin/hermes\
    \ \"$@\"\nfi\nexec /opt/hermes/.venv/bin/hermes \"$@\"\n"
kind: ConfigMap
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-cli-wrapper
  namespace: apps
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ports:
    - name: http
      port: 9119
      protocol: TCP
      targetPort: 9119
  selector:
    app: hermes-agent
    component: dashboard
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hermes.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: hermes-agent-dashboard
                port:
                  number: 9119
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hermes.josevictor.me
      secretName: wildcard-tls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
  name: hermes-agent-readonly
rules:
  - apiGroups:
      - ''
    resources:
      - pods
      - pods/log
      - pods/status
      - nodes
      - services
      - endpoints
      - configmaps
      - events
      - namespaces
      - persistentvolumes
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
  name: hermes-agent-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hermes-agent-readonly
subjects:
  - kind: ServiceAccount
    name: default
    namespace: apps
