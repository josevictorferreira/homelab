apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: dashboard
  name: hermes-agent-dashboard
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: dashboard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: dashboard
    spec:
      containers:
        - args:
            - dashboard
            - --host
            - 0.0.0.0
            - --port
            - '9119'
            - --no-open
            - --insecure
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '10000'
            - name: HERMES_HOME
              value: /opt/data
            - name: TZ
              value: America/Sao_Paulo
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: ghcr.io/josevictorferreira/hermes-agent:v0.12.0@sha256:97fae445c474d362b404b498ff3a4d012d3388bc1fb693e0a620ff7a7212c24d
          imagePullPolicy: IfNotPresent
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            tcpSocket:
              port: 9119
          name: dashboard
          ports:
            - containerPort: 9119
              name: http
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            tcpSocket:
              port: 9119
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
              drop:
                - ALL
            runAsUser: 0
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      terminationGracePeriodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
    component: gateway
  name: hermes-agent-gateway
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
      component: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
        component: gateway
    spec:
      containers:
        - args:
            - gateway
            - run
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '10000'
            - name: HERMES_HOME
              value: /opt/data
            - name: TZ
              value: America/Sao_Paulo
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: ghcr.io/josevictorferreira/hermes-agent:v0.12.0@sha256:97fae445c474d362b404b498ff3a4d012d3388bc1fb693e0a620ff7a7212c24d
          imagePullPolicy: IfNotPresent
          name: gateway
          resources:
            limits:
              cpu: 500m
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
              drop:
                - ALL
            runAsUser: 0
          volumeMounts:
            - mountPath: /opt/data
              name: hermes-data
              subPath: hermes
            - mountPath: /shared/notetaking
              name: hermes-data
              subPath: notetaking
            - mountPath: /usr/local/bin/hermes
              name: cli-wrapper
              subPath: hermes
      imagePullSecrets:
        - name: ghcr-registry-secret
      terminationGracePeriodSeconds: 60
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            defaultMode: 493
            name: hermes-agent-cli-wrapper
          name: cli-wrapper
---
apiVersion: v1
data:
  hermes: '#!/bin/sh

    exec gosu 10000:10000 /opt/hermes/.venv/bin/hermes "$@"

    '
kind: ConfigMap
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-cli-wrapper
  namespace: apps
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: hermes-agent
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ports:
    - name: http
      port: 9119
      protocol: TCP
      targetPort: 9119
  selector:
    app: hermes-agent
    component: dashboard
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: hermes-agent-dashboard
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hermes.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: hermes-agent-dashboard
                port:
                  number: 9119
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hermes.josevictor.me
      secretName: wildcard-tls
