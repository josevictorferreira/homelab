      containers:
        - command:
            - /bin/sh
            - -c
            - "                # Bootstrap pip if not present\n                command\
              \ -v pip >/dev/null 2>&1 || command -v pip3 >/dev/null 2>&1 || {\n \
              \                 python3 -c \"import urllib.request; exec(urllib.request.urlopen('https://bootstrap.pypa.io/get-pip.py').read())\"\
              \ --user -q 2>/dev/null || true\n                }\n               \
              \ # Bootstrap faster-whisper for audio transcription\n             \
              \   python3 -c \"import faster_whisper\" 2>/dev/null || {\n        \
              \          pip install --user -q faster-whisper 2>/dev/null || true\n\
              \                }\n                # Bootstrap kubectl if not present\n\
              \                command -v kubectl >/dev/null 2>&1 || {\n         \
              \         python3 -c \"\nimport urllib.request, os, stat, shutil\nurl\
              \ = 'https://dl.k8s.io/release/v1.32.6/bin/linux/amd64/kubectl'\ntmp\
              \ = '/tmp/kubectl'\ndest = '/opt/data/.local/bin/kubectl'\nos.makedirs('/opt/data/.local/bin',\
              \ exist_ok=True)\nurllib.request.urlretrieve(url, tmp)\nos.chmod(tmp,\
              \ stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)\n\
              shutil.move(tmp, dest)\n        \" 2>/dev/null || true\n           \
              \     }\n                # Bootstrap WhatsApp bridge dependencies if\
              \ needed\n                if [ \"${WHATSAPP_ENABLED:-false}\" = \"true\"\
              \ ]; then\n                  if [ -d /opt/hermes/scripts/whatsapp-bridge\
              \ ] && [ ! -f /opt/hermes/scripts/whatsapp-bridge/node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                    mkdir -p /opt/data/whatsapp-bridge-node_modules\n\
              \                    if [ ! -f /opt/data/whatsapp-bridge-node_modules/@whiskeysockets/baileys/package.json\
              \ ]; then\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && cp -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n                      (cd /opt/hermes/scripts/whatsapp-bridge\
              \ && NODE_OPTIONS=\"--max-old-space-size=256\" npm install --production\
              \ --no-audit --maxsockets 1 --prefer-offline 2>/dev/null) || true\n\
              \                      (cd /opt/hermes/scripts/whatsapp-bridge && cp\
              \ -r node_modules /opt/data/whatsapp-bridge-node_modules 2>/dev/null)\
              \ || true\n                    fi\n                    rm -rf /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \                    ln -s /opt/data/whatsapp-bridge-node_modules /opt/hermes/scripts/whatsapp-bridge/node_modules\n\
              \                  fi\n                fi\n\nexec hermes -p ted gateway\
              \ run\n"
          env:
            - name: HERMES_UID
              value: '10000'
            - name: HERMES_GID
              value: '2002'
            - name: TZ
              value: America/Sao_Paulo
            - name: AGENT_BROWSER_ENGINE
              value: lightpanda
            - name: AGENT_BROWSER_ENDPOINT
              value: http://lightpanda.apps.svc.cluster.local:9222
            - name: HINDSIGHT_MODE
              value: local_external
            - name: HINDSIGHT_API_URL
              value: http://hindsight-api.apps.svc.cluster.local:8888
            - name: HINDSIGHT_BANK_ID
              value: hermes
            - name: HINDSIGHT_BUDGET
              value: mid
            - name: HINDSIGHT_API_KEY
              value: dummy
            - name: HINDSIGHT_LLM_API_KEY
              value: dummy
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin
            - name: PYTHONPATH
              value: /opt/data/.local/lib/python3.13/site-packages
            - name: PYTHONUSERBASE
              value: /opt/data/.local
            - name: PIP_USER
              value: 'true'
            - name: PIP_REQUIRE_VIRTUALENV
              value: 'false'
            - name: HOME
              value: /opt/data/profiles/ted
            - name: HERMES_HOME
              value: /opt/data/profiles/ted
            - name: MATRIX_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: MATRIX_ACCESS_TOKEN
                  name: hermes-agent-env
          envFrom:
            - secretRef:
                name: hermes-agent-env
          image: docker.io/nousresearch/hermes-agent:v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
          imagePullPolicy: IfNotPresent
