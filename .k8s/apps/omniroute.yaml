apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: omniroute
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: omniroute
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: omniroute
      app.kubernetes.io/name: omniroute
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        omniroute.josevictor.me/input-sanitizer: disabled
        omniroute.josevictor.me/memory-mb: '3072'
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: omniroute
        app.kubernetes.io/name: omniroute
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - lab-gamma-wk
      automountServiceAccountToken: true
      containers:
        - command:
            - sh
            - -ec
            - "cd /app\n\nnode --input-type=module <<'NODE'\nimport fs from \"node:fs\"\
              ;\nimport path from \"node:path\";\nimport Database from \"better-sqlite3\"\
              ;\n\nconst chunksDir = \"/app/.build/next/server/chunks\";\nconst dbPath\
              \ = \"/app/data/storage.sqlite\";\n\nfunction walk(dir) {\n  if (!fs.existsSync(dir))\
              \ return [];\n  const entries = fs.readdirSync(dir, { withFileTypes:\
              \ true });\n  const files = [];\n  for (const entry of entries) {\n\
              \    const file = path.join(dir, entry.name);\n    if (entry.isDirectory())\
              \ files.push(...walk(file));\n    else if (entry.isFile() && file.endsWith(\"\
              .js\")) files.push(file);\n  }\n  return files;\n}\n\nconst responseBufferNeedle\
              \ = 'let j=\"\";await this.pipeSSE(i,b,a=>{j+=a.toString()});let k=this.now()-e;this.hookBufferUpdate(f,{status:i.status,responseHeaders:Object.fromEntries(i.headers.entries()),responseBody:j,responseSize:Buffer.byteLength(j),proxyLatencyMs:h-e,upstreamLatencyMs:k-(h-e)})';\n\
              const responseBufferReplacement = 'await this.pipeSSE(i,b);let k=this.now()-e;this.hookBufferUpdate(f,{status:i.status,responseHeaders:Object.fromEntries(i.headers.entries()),responseBody:null,responseSize:0,proxyLatencyMs:h-e,upstreamLatencyMs:k-(h-e)})';\n\
              const captureNeedle = 'shouldCaptureBody(){return!0}';\nconst captureReplacement\
              \ = 'shouldCaptureBody(){return!1}';\n\nlet responseBufferPatches =\
              \ 0;\nlet capturePatches = 0;\nlet remainingResponseBuffers = 0;\n\n\
              for (const file of walk(chunksDir)) {\n  const before = fs.readFileSync(file,\
              \ \"utf8\");\n  let after = before;\n\n  const responseOccurrences =\
              \ after.split(responseBufferNeedle).length - 1;\n  if (responseOccurrences\
              \ > 0) {\n    after = after.split(responseBufferNeedle).join(responseBufferReplacement);\n\
              \    responseBufferPatches += responseOccurrences;\n  }\n\n  const captureOccurrences\
              \ = after.split(captureNeedle).length - 1;\n  if (captureOccurrences\
              \ > 0) {\n    after = after.split(captureNeedle).join(captureReplacement);\n\
              \    capturePatches += captureOccurrences;\n  }\n\n  remainingResponseBuffers\
              \ += after.split(responseBufferNeedle).length - 1;\n  if (after !==\
              \ before) fs.writeFileSync(file, after);\n}\n\nif (remainingResponseBuffers\
              \ > 0) {\n  throw new Error(\"OmniRoute AgentBridge response buffering\
              \ patch left unpatched call sites\");\n}\n\nconsole.log(\"[omniroute-startup]\
              \ response buffer patches=\" + responseBufferPatches + \" body capture\
              \ patches=\" + capturePatches);\n\nconst comboNames = [\"radagast\"\
              , \"mimo-v2.5\", \"pippin\", \"gandalf\"];\nconst logSettings = [\n\
              \  [\"databaseSettings\", \"logs.detailedLogsEnabled\", false],\n  [\"\
              databaseSettings\", \"logs.callLogPipelineEnabled\", false],\n  [\"\
              databaseSettings\", \"logs.maxDetailSizeKb\", 10],\n  [\"databaseSettings\"\
              , \"logs.ringBufferSize\", 100],\n  [\"databaseSettings\", \"detailedLogsEnabled\"\
              , false],\n  [\"databaseSettings\", \"callLogPipelineEnabled\", false],\n\
              \  [\"databaseSettings\", \"maxDetailSizeKb\", 10],\n  [\"databaseSettings\"\
              , \"ringBufferSize\", 100],\n  [\"settings\", \"detailed_logs_enabled\"\
              , false],\n  [\"settings\", \"call_log_pipeline_enabled\", false],\n\
              ];\n\nfunction enforceDatabaseSettings() {\n  if (!fs.existsSync(dbPath))\
              \ {\n    console.log(\"[omniroute-startup] sqlite database not found;\
              \ skipping config enforcement\");\n    return;\n  }\n\n  const db =\
              \ new Database(dbPath);\n  const deleteKey = db.prepare(\"DELETE FROM\
              \ key_value WHERE namespace = ? AND key = ?\");\n  const insertKey =\
              \ db.prepare(\"INSERT INTO key_value (namespace, key, value) VALUES\
              \ (?, ?, ?)\");\n  const updateProviderConcurrency = db.prepare(\"UPDATE\
              \ provider_connections SET max_concurrent = 1 WHERE is_active = 1 AND\
              \ (max_concurrent IS NULL OR max_concurrent > 1)\");\n  const selectCombos\
              \ = db.prepare(\"SELECT id, name, data FROM combos WHERE name IN (\"\
              \ + comboNames.map(() => \"?\").join(\",\") + \")\");\n  const updateCombo\
              \ = db.prepare(\"UPDATE combos SET data = ?, updated_at = datetime('now')\
              \ WHERE id = ?\");\n\n  const tx = db.transaction(() => {\n    for (const\
              \ [namespace, key, value] of logSettings) {\n      deleteKey.run(namespace,\
              \ key);\n      insertKey.run(namespace, key, JSON.stringify(value));\n\
              \    }\n\n    const providerChanges = updateProviderConcurrency.run().changes;\n\
              \    let comboChanges = 0;\n\n    for (const row of selectCombos.all(...comboNames))\
              \ {\n      let data = {};\n      try {\n        data = JSON.parse(row.data\
              \ || \"{}\");\n      } catch {\n        data = {};\n      }\n\n    \
              \  if (!data.config || typeof data.config !== \"object\" || Array.isArray(data.config))\
              \ {\n        data.config = {};\n      }\n\n      data.config.concurrencyPerModel\
              \ = 1;\n      data.config.queueDepth = 1;\n      data.config.queueTimeoutMs\
              \ = 10000;\n      data.config.maxRetries = 0;\n\n      updateCombo.run(JSON.stringify(data),\
              \ row.id);\n      comboChanges += 1;\n    }\n\n    console.log(\"[omniroute-startup]\
              \ provider concurrency rows=\" + providerChanges + \" combo rows=\"\
              \ + comboChanges + \" log settings=\" + logSettings.length);\n  });\n\
              \n  tx();\n  db.close();\n}\n\nenforceDatabaseSettings();\nNODE\n\n\
              exec node dev/run-standalone.mjs\n"
          env:
            - name: DISABLE_SQLITE_AUTO_BACKUP
              value: 'true'
          envFrom:
            - secretRef:
                name: omniroute-env
          image: ghcr.io/diegosouzapw/omniroute:3.8.44@sha256:8f9edab240d05c966bf2ef88b458f58fcf824ea9b454ac78d23231467acbbd1e
          imagePullPolicy: IfNotPresent
          name: main
          ports:
            - containerPort: 20128
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 4Gi
            requests:
              cpu: 250m
              memory: 1Gi
          volumeMounts:
            - mountPath: /app/data
              name: data
            - mountPath: /app/data-home
              name: data-home
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      imagePullSecrets:
        - name: ghcr-registry-secret
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      serviceAccountName: default
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omniroute-data
        - name: data-home
          persistentVolumeClaim:
            claimName: omniroute-data-home
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: omniroute
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: omniroute-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: omniroute
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: omniroute-data-home
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
    lbipam.cilium.io/ips: 10.10.10.148
    lbipam.cilium.io/sharing-key: omniroute
  labels:
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/service: omniroute
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: omniroute
  namespace: apps
spec:
  ports:
    - name: http
      port: 20128
      protocol: TCP
      targetPort: 20128
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/name: omniroute
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: omniroute
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: omniroute
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: omniroute
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: omniroute.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: omniroute
                port:
                  number: 20128
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - omniroute.josevictor.me
      secretName: wildcard-tls
