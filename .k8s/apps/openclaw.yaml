apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app: openclaw
  name: openclaw
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - lab-beta-cp
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - lab-delta-cp
                      - lab-alpha-cp
      automountServiceAccountToken: false
      containers:
        - command:
            - /bin/bash
            - -lc
            - "        set -euo pipefail\n\n        STATE_DIR=/persistent/openclaw\n\
              \        HOME_DIR=$STATE_DIR/home\n        mkdir -p \"$STATE_DIR\" \"\
              $HOME_DIR\"\n\n        if [ ! -f \"$STATE_DIR/.openclaw-ready\" ]; then\n\
              \          echo \"Initializing persistent OpenClaw state...\"\n    \
              \      mkdir -p \"$HOME_DIR/.openclaw\" \"$HOME_DIR/.cache\" \"$HOME_DIR/.local\"\
              \ \"$HOME_DIR/workspace\"\n          touch \"$STATE_DIR/.openclaw-ready\"\
              \n          echo \"Persistent state initialized.\"\n        else\n \
              \         echo \"Using existing persistent state at $STATE_DIR\"\n \
              \       fi\n\n        mkdir -p \"$HOME_DIR/.openclaw\" \"$HOME_DIR/.cache/ms-playwright\"\
              \ \"$HOME_DIR/workspace\"\n\n        if [ ! -f \"$HOME_DIR/.openclaw/openclaw.json\"\
              \ ]; then\n          echo \"Seeding OpenClaw config from ConfigMap...\"\
              \n          cp /config/config-template.json \"$HOME_DIR/.openclaw/openclaw.json\"\
              \n        fi\n\n        export HOME=/root\n        export OPENCLAW_DATA_DIR=/root/.openclaw\n\
              \        export OPENCLAW_STATE_DIR=/root/.openclaw\n        export OPENCLAW_CONFIG_PATH=/root/.openclaw/openclaw.json\n\
              \        export OPENCLAW_PLUGIN_STAGE_DIR=/tmp/openclaw-plugin-stage\n\
              \        export NPM_CONFIG_PREFIX=/usr/local\n        export PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright\n\
              \        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\n\
              \n        mount --bind \"$HOME_DIR\" /root\n\n        sync_plugin_config()\
              \ {\n          echo \"Ensuring required OpenClaw plugins are enabled...\"\
              \n          node <<'NODE'\nconst fs = require(\"fs\");\n\nconst configPath\
              \ = \"/root/.openclaw/openclaw.json\";\nconst requiredPlugins = [\"\
              lossless-claw\", \"matrix\"];\n\nconst config = JSON.parse(fs.readFileSync(configPath,\
              \ \"utf8\"));\nconfig.plugins ??= {};\nconfig.plugins.enabled = true;\n\
              \nconst allow = new Set(Array.isArray(config.plugins.allow) ? config.plugins.allow\
              \ : []);\nfor (const plugin of requiredPlugins) allow.add(plugin);\n\
              config.plugins.allow = Array.from(allow);\n\nconfig.plugins.entries\
              \ ??= {};\nconfig.plugins.entries.matrix = {\n  ...(config.plugins.entries.matrix\
              \ ?? {}),\n  enabled: true,\n};\n\nconfig.plugins.entries[\"lossless-claw\"\
              ] = {\n  ...(config.plugins.entries[\"lossless-claw\"] ?? {}),\n  enabled:\
              \ true,\n  config: {\n    ...((config.plugins.entries[\"lossless-claw\"\
              ] ?? {}).config ?? {}),\n    enabled: true,\n  },\n};\n\nfs.writeFileSync(configPath,\
              \ JSON.stringify(config, null, 2) + \"\\n\", { mode: 0o600 });\nNODE\n\
              \        }\n\n        install_lossless_claw() {\n          plugin_dir=/root/.openclaw/extensions/lossless-claw\n\
              \          if [ -f \"$plugin_dir/openclaw.plugin.json\" ]; then\n  \
              \          echo \"lossless-claw plugin already installed.\"\n      \
              \      return\n          fi\n\n          echo \"Installing lossless-claw\
              \ plugin into persistent OpenClaw state...\"\n          tmp_dir=\"$(mktemp\
              \ -d)\"\n          trap 'rm -rf \"$tmp_dir\"' EXIT\n          rm -rf\
              \ \"$plugin_dir\"\n          mkdir -p \"$plugin_dir\"\n          npm\
              \ pack @martian-engineering/lossless-claw@0.9.2 --pack-destination \"\
              $tmp_dir\" >/dev/null\n          tar -xzf \"$tmp_dir\"/martian-engineering-lossless-claw-0.9.2.tgz\
              \ -C \"$plugin_dir\" --strip-components=1\n          npm install --omit=dev\
              \ --ignore-scripts --legacy-peer-deps --prefix \"$plugin_dir\"\n   \
              \       echo \"lossless-claw plugin installed.\"\n        }\n\n    \
              \    sync_plugin_config\n        install_lossless_claw\n\n        cd\
              \ /root/workspace\n        exec node /app/openclaw.mjs gateway --port\
              \ 18789 --bind lan --allow-unconfigured --verbose\n"
          env:
            - name: HOME
              value: /root
            - name: OPENCLAW_DATA_DIR
              value: /root/.openclaw
            - name: OPENCLAW_STATE_DIR
              value: /root/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /root/.openclaw/openclaw.json
          envFrom:
            - secretRef:
                name: openclaw-test-config
          image: ghcr.io/openclaw/openclaw:2026.4.26@sha256:2e32f4f2e4f653f12d5dc6e5c93cc71e60f49d1dfaf061b18e53c3e61a38fb48
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 60
            timeoutSeconds: 10
          name: openclaw
          ports:
            - containerPort: 18789
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            limits:
              cpu: '1'
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_CHROOT
            runAsGroup: 0
            runAsUser: 0
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - mountPath: /persistent
              name: persistent
            - mountPath: /config
              name: config
              readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
        - name: persistent
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - configMap:
            name: openclaw-test-config
          name: config
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw
  namespace: apps
spec:
  ports:
    - name: http
      port: 18789
      protocol: TCP
      targetPort: http
  selector:
    app: openclaw
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: openclaw-test.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: openclaw
                port:
                  number: 18789
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - openclaw-test.josevictor.me
      secretName: wildcard-tls
