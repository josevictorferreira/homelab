apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: cloakbrowser
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloakbrowser
  template:
    metadata:
      labels:
        app: cloakbrowser
    spec:
      containers:
        - command:
            - cloakserve
          env:
            - name: CLOAKBROWSER_NO_SANDBOX
              value: '1'
          image: cloakhq/cloakbrowser:latest
          livenessProbe:
            httpGet:
              path: /json/version
              port: 9222
            initialDelaySeconds: 30
            periodSeconds: 30
          name: cloakbrowser
          ports:
            - containerPort: 9222
              name: cdp
          readinessProbe:
            httpGet:
              path: /json/version
              port: 9222
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            limits:
              cpu: '2'
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - mountPath: /dev/shm
              name: devshm
      volumes:
        - emptyDir:
            medium: Memory
          name: devshm
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: cloakbrowser
  namespace: apps
spec:
  ports:
    - name: cdp
      port: 9222
      targetPort: 9222
  selector:
    app: cloakbrowser
