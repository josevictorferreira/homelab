apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: cloakbrowser
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloakbrowser
  template:
    metadata:
      labels:
        app: cloakbrowser
    spec:
      containers:
        - args:
            - sh
            - -c
            - touch /.dockerenv && exec cloakserve
          image: cloakhq/cloakbrowser:latest
          name: cloakbrowser
          ports:
            - containerPort: 9222
              name: cdp
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: 9222
          resources:
            limits:
              cpu: '2'
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 512Mi
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - mountPath: /dev/shm
              name: devshm
      volumes:
        - emptyDir:
            medium: Memory
          name: devshm
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: cloakbrowser
  namespace: apps
spec:
  ports:
    - name: cdp
      port: 9222
      targetPort: 9222
  selector:
    app: cloakbrowser
