apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tuwunel
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tuwunel
    spec:
      containers:
        - env:
            - name: TUWUNEL_SERVER_NAME
              value: matrixx.josevictor.me
            - name: TUWUNEL_DATABASE_PATH
              value: /var/lib/tuwunel
            - name: TUWUNEL_ADDRESS
              value: 0.0.0.0
            - name: TUWUNEL_PORT
              value: '8008'
            - name: TUWUNEL_ALLOW_FEDERATION
              value: 'false'
            - name: TUWUNEL_ALLOW_REGISTRATION
              value: 'true'
            - name: TUWUNEL_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  key: registration_token
                  name: tuwunel-env
          image: ghcr.io/matrix-construct/tuwunel:v1.5.1@sha256:25693407bc059eec7e161418edd02b2b7c010516c855056a7672883b04f71b11
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 10
          name: tuwunel
          ports:
            - containerPort: 8008
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /var/lib/tuwunel
              name: data
            - mountPath: /etc/tuwunel/tuwunel.toml
              name: config
              readOnly: true
              subPath: tuwunel.toml
            - mountPath: /etc/tuwunel/registration_token
              name: token
              readOnly: true
              subPath: registration_token
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tuwunel-data
        - configMap:
            name: tuwunel-config
          name: config
        - name: token
          secret:
            secretName: tuwunel-env
---
apiVersion: v1
data:
  tuwunel.toml: '[global]

    server_name = "matrixx.josevictor.me"

    database_path = "/var/lib/tuwunel"

    address = "0.0.0.0"

    port = 8008

    allow_federation = false

    federate_created_rooms = false

    allow_registration = true

    '
kind: ConfigMap
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel-config
  namespace: apps
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  ports:
    - name: http
      port: 8008
      targetPort: 8008
  selector:
    app: tuwunel
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: matrixx.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: tuwunel
                port:
                  number: 8008
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - matrixx.josevictor.me
      secretName: wildcard-tls
