apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tuwunel
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tuwunel
    spec:
      containers:
        - env:
            - name: TUWUNEL_CONFIG
              value: /etc/tuwunel/tuwunel.toml
            - name: TUWUNEL_SERVER_NAME
              value: josevictor.me
            - name: TUWUNEL_DATABASE_PATH
              value: /var/lib/tuwunel
            - name: TUWUNEL_ADDRESS
              value: 0.0.0.0
            - name: TUWUNEL_PORT
              value: '8008'
            - name: TUWUNEL_ALLOW_FEDERATION
              value: 'false'
            - name: TUWUNEL_ALLOW_REGISTRATION
              value: 'true'
            - name: TUWUNEL_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  key: registration_token
                  name: tuwunel-env
            - name: TUWUNEL_WELL_KNOWN__CLIENT
              value: https://matrix.josevictor.me
            - name: TUWUNEL_WELL_KNOWN__SERVER
              value: matrix.josevictor.me:443
            - name: TUWUNEL_EMERGENCY_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: TUWUNEL_EMERGENCY_PASSWORD
                  name: tuwunel-env
            - name: TUWUNEL_DB_POOL_AFFINITY
              value: 'false'
            - name: TUWUNEL_DB_POOL_WORKERS
              value: '16'
          image: ghcr.io/matrix-construct/tuwunel:v1.5.1@sha256:25693407bc059eec7e161418edd02b2b7c010516c855056a7672883b04f71b11
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 30
          name: tuwunel
          ports:
            - containerPort: 8008
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 10
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 30
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 30
          volumeMounts:
            - mountPath: /var/lib/tuwunel
              name: data
            - mountPath: /etc/tuwunel/tuwunel.toml
              name: config
              readOnly: true
              subPath: tuwunel.toml
      terminationGracePeriodSeconds: 120
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tuwunel-data-v2
        - name: config
          secret:
            secretName: tuwunel-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel-data-v2
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  ports:
    - name: http
      port: 8008
      targetPort: 8008
  selector:
    app: tuwunel
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: tuwunel
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: matrix.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: tuwunel
                port:
                  number: 8008
            path: /
            pathType: Prefix
    - host: josevictor.me
      http:
        paths:
          - backend:
              service:
                name: tuwunel
                port:
                  number: 8008
            path: /.well-known/matrix
            pathType: Prefix
  tls:
    - hosts:
        - matrix.josevictor.me
        - josevictor.me
      secretName: wildcard-tls
