apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: openclaw-nix
      app.kubernetes.io/name: openclaw-nix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: openclaw-nix
        app.kubernetes.io/name: openclaw-nix
    spec:
      automountServiceAccountToken: true
      containers:
        - command:
            - bash
            - -c
            - "set -e\n\n# Wait for CephFS mount to be writable (avoids EACCES race\
              \ on startup)\necho \"Waiting for CephFS mount at /home/node/.openclaw...\"\
              \nfor i in $(seq 1 30); do\n  if touch /home/node/.openclaw/.mount-check\
              \ 2>/dev/null; then\n    rm -f /home/node/.openclaw/.mount-check\n \
              \   echo \"CephFS mount ready\"\n    break\n  fi\n  echo \"Mount not\
              \ ready, attempt $i/30...\"\n  sleep 2\ndone\n\n# Ensure persistent\
              \ directories exist for npm/pip packages\nmkdir -p /home/node/.npm-global/bin\n\
              mkdir -p /home/node/.local/lib/python\nmkdir -p /home/node/.local/bin\n\
              mkdir -p /home/node/.config\nmkdir -p /home/node/.openclaw\n\n# Seed\
              \ config from ConfigMap template if CephFS file doesn't exist yet\n\
              CONFIG_FILE=\"/home/node/.openclaw/openclaw.json\"\nif [ ! -f \"$CONFIG_FILE\"\
              \ ]; then\n  echo \"First run: seeding config from template...\"\n \
              \ cp /etc/openclaw/config-template.json \"$CONFIG_FILE\"\n  echo \"\
              Config seeded at $CONFIG_FILE\"\nelse\n  echo \"Using existing config\
              \ at $CONFIG_FILE\"\nfi\n\n# Perform environment variable substitution\
              \ on openclaw.json\n# This ensures that tokens from secrets are correctly\
              \ injected\necho \"Performing environment variable substitution in $CONFIG_FILE...\"\
              \nALLOWLIST=\"OPENCLAW_MATRIX_TOKEN ELEVENLABS_API_KEY KIMI_API_KEY\
              \ OPENROUTER_API_KEY KIMI_API_KEY MINIMAX_API_KEY Z_AI_API_KEY ALIBABA_CODING_PLAN_API_KEY\
              \ WHATSAPP_NUMBER WHATSAPP_BOT_NUMBER GEMINI_API_KEY GITHUB_TOKEN TS_AUTHKEY\
              \ KIRA_MATRIX_TOKEN LUNA_MATRIX_TOKEN MEL_MATRIX_TOKEN SPIKE_MATRIX_TOKEN\
              \ COPILOT_GITHUB_TOKEN\"\nfor var_name in $ALLOWLIST; do\n  var_value=$(eval\
              \ printf '%s' \"\\$$var_name\")\n  if [ -n \"$var_value\" ]; then\n\
              \    escaped_value=$(echo \"$var_value\" | sed 's/[\\\\/&]/\\\\&/g')\n\
              \    sed -i \"s|\\\\\\${$var_name}|$escaped_value|g\" \"$CONFIG_FILE\"\
              \n  fi\ndone\necho \"Substitution complete\"\n\necho \"Installing matrix\
              \ plugin dependencies...\"\n\n# Find the actual nix store path where\
              \ the gateway loads extensions from\nMATRIX_EXT=$(readlink -f /lib/openclaw/extensions/matrix\
              \ 2>/dev/null || echo \"/lib/openclaw/extensions/matrix\")\n\nif [ -d\
              \ \"$MATRIX_EXT\" ]; then\n  echo \"Found matrix extension at: $MATRIX_EXT\"\
              \n  cd \"$MATRIX_EXT\"\n\n  if [ ! -d \"node_modules/@vector-im\" ];\
              \ then\n    echo \"Installing npm dependencies...\"\n    node -e \"\n\
              \      const fs = require('fs');\n      const pkg = JSON.parse(fs.readFileSync('package.json',\
              \ 'utf8'));\n      delete pkg.devDependencies;\n      fs.writeFileSync('package.json',\
              \ JSON.stringify(pkg, null, 2));\n    \"\n    npm install --omit=dev\
              \ --no-package-lock --legacy-peer-deps 2>&1 || echo \"WARN: npm install\
              \ failed\"\n    echo \"Matrix plugin dependencies installed\"\n  else\n\
              \    echo \"node_modules already exists with deps, skipping\"\n  fi\n\
              else\n  echo \"Matrix extension not found at $MATRIX_EXT\"\nfi\n\necho\
              \ \"Installing whatsapp plugin dependencies...\"\nWA_EXT=$(readlink\
              \ -f /lib/openclaw/extensions/whatsapp 2>/dev/null || echo \"/lib/openclaw/extensions/whatsapp\"\
              )\n\nif [ -d \"$WA_EXT\" ]; then\n  echo \"Found whatsapp extension\
              \ at: $WA_EXT\"\n  cd \"$WA_EXT\"\n\n  if [ ! -d \"node_modules/@whiskeysockets\"\
              \ ]; then\n    echo \"Installing npm dependencies...\"\n    node -e\
              \ \"\n      const fs = require('fs');\n      const pkg = JSON.parse(fs.readFileSync('package.json',\
              \ 'utf8'));\n      delete pkg.devDependencies;\n      delete pkg.peerDependencies;\n\
              \      fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));\n\
              \    \"\n    npm install --omit=dev --no-package-lock --legacy-peer-deps\
              \ 2>&1 || echo \"WARN: npm install failed\"\n    echo \"WhatsApp plugin\
              \ dependencies installed\"\n  else\n    echo \"node_modules already\
              \ exists with deps, skipping\"\n  fi\nelse\n  echo \"WhatsApp extension\
              \ not found at $WA_EXT\"\nfi\n\n# Plugin sources already synced at image\
              \ build time by oci-images/openclaw-nix/default.nix\n\nexec node /lib/openclaw/dist/index.js\
              \ gateway --port 18789\n"
          env:
            - name: HOME
              value: /home/node
            - name: MATRIX_KIRA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: KIRA_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_LUNA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: LUNA_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_MEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: MEL_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_SPIKE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: SPIKE_MATRIX_TOKEN
                  name: openclaw-config
            - name: NODE_PATH
              value: /lib/openclaw/extensions/matrix/node_modules:/lib/openclaw/node_modules
            - name: NPM_CONFIG_PREFIX
              value: /home/node/.npm-global
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_DATA_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_NIX_MODE
              value: '1'
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: PATH
              value: /home/node/.local/bin:/home/node/.npm-global/bin:/bin:/usr/bin
            - name: PIP_TARGET
              value: /home/node/.local/lib/python
            - name: PYTHONPATH
              value: /home/node/.local/lib/python
            - name: TZ
              value: America/Sao_Paulo
          envFrom:
            - secretRef:
                name: openclaw-config
          image: ghcr.io/josevictorferreira/openclaw-nix:v2026.4.1c@sha256:9549afc83f2cbd58d73b6bd0f90bcadd1f2d664a9b7194b5dd0c6333ae7c2ce1
          imagePullPolicy: Always
          name: main
          ports:
            - containerPort: 18789
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 1500m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - mountPath: /etc/openclaw
              name: openclaw-config
              readOnly: true
            - mountPath: /home/node
              name: shared-storage
              subPath: openclaw-home
            - mountPath: /home/node/.openclaw
              name: shared-storage
              subPath: openclaw
            - mountPath: /home/node/shared
              name: shared-storage
        - env:
            - name: TS_ACCEPT_DNS
              value: 'false'
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  key: TS_AUTHKEY
                  name: openclaw-config
            - name: TS_AUTH_ONCE
              value: 'true'
            - name: TS_HOSTNAME
              value: openclaw-nix
            - name: TS_KUBE_SECRET
              value: ''
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: 'false'
          image: tailscale/tailscale:latest
          name: tailscale
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - mountPath: /dev/net/tun
              name: dev-tun
            - mountPath: /var/lib/tailscale
              name: tailscale-state
      dnsConfig:
        nameservers:
          - 10.43.0.10
          - 100.100.100.100
        options:
          - name: ndots
            value: '5'
        searches:
          - apps.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      dnsPolicy: None
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      imagePullSecrets:
        - name: ghcr-registry-secret
      priorityClassName: high-priority
      serviceAccountName: openclaw-nix
      volumes:
        - hostPath:
            path: /dev/net/tun
          name: dev-tun
        - configMap:
            name: openclaw-config
          name: openclaw-config
        - name: shared-storage
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: openclaw-nix
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
    lbipam.cilium.io/ips: 10.10.10.141
    lbipam.cilium.io/sharing-key: openclaw-nix
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    app.kubernetes.io/service: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  ports:
    - name: http
      port: 18789
      protocol: TCP
      targetPort: 18789
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/name: openclaw-nix
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: openclaw.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: openclaw-nix
                port:
                  number: 18789
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - openclaw.josevictor.me
      secretName: wildcard-tls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix-cluster-admin
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
  - nonResourceURLs:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-nix-cluster-admin
subjects:
  - kind: ServiceAccount
    name: openclaw-nix
    namespace: apps
