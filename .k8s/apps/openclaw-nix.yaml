apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: openclaw-nix
      app.kubernetes.io/name: openclaw-nix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: openclaw-nix
        app.kubernetes.io/name: openclaw-nix
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - lab-beta-cp
              weight: 100
      automountServiceAccountToken: true
      containers:
        - command:
            - bash
            - -c
            - "set -e\n\n# Wait for CephFS mount to be writable (avoids EACCES race\
              \ on startup)\necho \"Waiting for CephFS mount at /home/node/.openclaw...\"\
              \nfor i in $(seq 1 30); do\n  if touch /home/node/.openclaw/.mount-check\
              \ 2>/dev/null; then\n    rm -f /home/node/.openclaw/.mount-check\n \
              \   echo \"CephFS mount ready\"\n    break\n  fi\n  echo \"Mount not\
              \ ready, attempt $i/30...\"\n  sleep 2\ndone\n\n\n# Ensure persistent\
              \ directories exist for npm/pip packages on /data block storage\nmkdir\
              \ -p /data/npm-global/bin\nmkdir -p /data/local/lib/python\nmkdir -p\
              \ /data/local/bin\nmkdir -p /data/plugin-stage\nmkdir -p /data/openclaw-compile-cache\n\
              mkdir -p /data/openclaw\nmkdir -p /home/node/.config\nmkdir -p /home/node/.openclaw\n\
              \n# Seed config from ConfigMap template if CephFS file doesn't exist\
              \ yet\nCONFIG_FILE=\"/home/node/.openclaw/openclaw.json\"\nif [ ! -f\
              \ \"$CONFIG_FILE\" ]; then\n  echo \"First run: seeding config from\
              \ template...\"\n  cp /etc/openclaw/config-template.json \"$CONFIG_FILE\"\
              \n  echo \"Config seeded at $CONFIG_FILE\"\nelse\n  echo \"Using existing\
              \ config at $CONFIG_FILE\"\nfi\n\nexec node /lib/openclaw/dist/index.js\
              \ gateway --port 18789\n"
          env:
            - name: AGENT_BROWSER_ENDPOINT
              value: http://lightpanda.apps.svc.cluster.local:9222
            - name: AGENT_BROWSER_ENGINE
              value: lightpanda
            - name: HOME
              value: /home/node
            - name: MATRIX_KIRA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: KIRA_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_LUNA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: LUNA_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_MEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: MEL_MATRIX_TOKEN
                  name: openclaw-config
            - name: MATRIX_SPIKE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  key: SPIKE_MATRIX_TOKEN
                  name: openclaw-config
            - name: NODE_COMPILE_CACHE
              value: /data/openclaw-compile-cache
            - name: NODE_PATH
              value: /lib/openclaw/extensions/memory-lancedb/node_modules:/lib/openclaw/dist/extensions/memory-lancedb/node_modules:/lib/openclaw/extensions/matrix/node_modules:/lib/openclaw/node_modules
            - name: NPM_CONFIG_PREFIX
              value: /data/npm-global
            - name: OPENCLAW_ALLOW_ROOT
              value: '1'
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_DATA_DIR
              value: /data/openclaw
            - name: OPENCLAW_NIX_MODE
              value: '1'
            - name: OPENCLAW_NO_RESPAWN
              value: '1'
            - name: OPENCLAW_PLUGIN_STAGE_DIR
              value: /data/plugin-stage
            - name: OPENCLAW_STATE_DIR
              value: /data/openclaw
            - name: OPENCLAW_TRAJECTORY
              value: 'false'
            - name: PATH
              value: /data/local/bin:/data/npm-global/bin:/bin:/usr/bin
            - name: PIP_TARGET
              value: /data/local/lib/python
            - name: PYTHONPATH
              value: /data/local/lib/python
            - name: TZ
              value: America/Sao_Paulo
          envFrom:
            - secretRef:
                name: openclaw-config
          image: ghcr.io/josevictorferreira/openclaw-nix:v2026.5.12-beta.6-lightpanda@sha256:622fc4df88822927facd49411d5a31cfba5dc6ed041b7c59740966e463c48e07
          imagePullPolicy: Always
          name: main
          ports:
            - containerPort: 18789
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 30
            initialDelaySeconds: 120
            periodSeconds: 15
            tcpSocket:
              port: 18789
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - mountPath: /data
              name: data-block
            - mountPath: /data/openclaw/lcm.db.d
              name: lcm-db
            - mountPath: /etc/openclaw
              name: openclaw-config
              readOnly: true
            - mountPath: /home/node/.openclaw
              name: shared-storage
              subPath: openclaw
            - mountPath: /shared/notetaking
              name: shared-storage
              subPath: notetaking
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      imagePullSecrets:
        - name: ghcr-registry-secret
      priorityClassName: high-priority
      serviceAccountName: openclaw-nix
      volumes:
        - name: data-block
          persistentVolumeClaim:
            claimName: openclaw-nix-data-block
        - name: lcm-db
          persistentVolumeClaim:
            claimName: openclaw-nix-lcm-db
        - configMap:
            name: openclaw-config
          name: openclaw-config
        - name: shared-storage
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    helm.sh/resource-policy: keep
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix-data-block
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    helm.sh/resource-policy: keep
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix-lcm-db
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
    lbipam.cilium.io/ips: 10.10.10.141
    lbipam.cilium.io/sharing-key: openclaw-nix
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    app.kubernetes.io/service: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  ports:
    - name: http
      port: 18789
      protocol: TCP
      targetPort: 18789
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/name: openclaw-nix
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: openclaw-nix
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw-nix
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: openclaw-nix
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: openclaw.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: openclaw-nix
                port:
                  number: 18789
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - openclaw.josevictor.me
      secretName: wildcard-tls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix-cluster-admin
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
  - nonResourceURLs:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: openclaw-nix-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-nix-cluster-admin
subjects:
  - kind: ServiceAccount
    name: openclaw-nix
    namespace: apps
