apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: personal-finances
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-finances
  template:
    metadata:
      labels:
        app: personal-finances
    spec:
      containers:
        - image: ghcr.io/josevictorferreira/personal-finances@sha256:38db0b80aec3c9c4feda021f452fc49fc78a4f9bb26cc4cb37cf3413f143fc56
          imagePullPolicy: IfNotPresent
          name: personal-finances
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /shared
              name: cephfs
              readOnly: false
            - mountPath: /etc/nginx/.htpasswd
              name: htpasswd
              readOnly: true
              subPath: .htpasswd
      imagePullSecrets:
        - name: ghcr-registry-secret
      volumes:
        - name: cephfs
          persistentVolumeClaim:
            claimName: cephfs-shared-storage-root
        - name: htpasswd
          secret:
            items:
              - key: .htpasswd
                path: .htpasswd
            secretName: personal-finances-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: personal-finances
  namespace: apps
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    app: personal-finances
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: personal-finances
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: personal-finances.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: personal-finances
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - personal-finances.josevictor.me
      secretName: wildcard-tls
