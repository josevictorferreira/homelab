apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: hindsight-api
      app.kubernetes.io/name: hindsight-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: hindsight-api
        app.kubernetes.io/name: hindsight-api
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: HINDSIGHT_API_CONSOLIDATION_LLM_MAX_RETRIES
              value: '1'
            - name: HINDSIGHT_API_CONSOLIDATION_LLM_TIMEOUT
              value: '45'
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL
              value: https://openrouter.ai/api/v1
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL
              value: intfloat/multilingual-e5-large
            - name: HINDSIGHT_API_EMBEDDINGS_PROVIDER
              value: openai
            - name: HINDSIGHT_API_HOST
              value: 0.0.0.0
            - name: HINDSIGHT_API_LLM_BASE_URL
              value: https://omniroute.josevictor.me/v1
            - name: HINDSIGHT_API_LLM_MAX_CONCURRENT
              value: '8'
            - name: HINDSIGHT_API_LLM_MAX_RETRIES
              value: '1'
            - name: HINDSIGHT_API_LLM_MODEL
              value: pippin
            - name: HINDSIGHT_API_LLM_PROVIDER
              value: openai
            - name: HINDSIGHT_API_LLM_TIMEOUT
              value: '30'
            - name: HINDSIGHT_API_PORT
              value: '8888'
            - name: HINDSIGHT_API_REFLECT_LLM_MODEL
              value: haldir
            - name: HINDSIGHT_API_RERANKER_MAX_CANDIDATES
              value: '32'
            - name: HINDSIGHT_API_RERANKER_PROVIDER
              value: siliconflow
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_BASE_URL
              value: https://api.siliconflow.com/v1
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_MODEL
              value: Qwen/Qwen3-Reranker-0.6B
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_TIMEOUT
              value: '60'
            - name: HINDSIGHT_API_RETAIN_LLM_MAX_RETRIES
              value: '1'
            - name: HINDSIGHT_API_RETAIN_LLM_TIMEOUT
              value: '30'
            - name: HINDSIGHT_API_TEXT_SEARCH_EXTENSION
              value: native
            - name: HINDSIGHT_API_TEXT_SEARCH_EXTENSION_NATIVE_LANGUAGE
              value: portuguese
            - name: HINDSIGHT_API_VECTOR_EXTENSION
              value: pgvector
            - name: HINDSIGHT_API_WORKER_CONSOLIDATION_MAX_SLOTS
              value: '2'
            - name: HINDSIGHT_API_WORKER_MAX_SLOTS
              value: '8'
          envFrom:
            - secretRef:
                name: hindsight-secrets
          image: ghcr.io/vectorize-io/hindsight-api:0.8.2@sha256:88a8aa3d2528cbd5cc9c053ce3facf5d5380cbb1739f0e2a09cefb7de31391e5
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          name: main
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 50m
              memory: 512Mi
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: preemptible
      serviceAccountName: default
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
    lbipam.cilium.io/ips: 10.10.10.145
    lbipam.cilium.io/sharing-key: hindsight-api
  labels:
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    app.kubernetes.io/service: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  ports:
    - name: http
      port: 8888
      protocol: TCP
      targetPort: 8888
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/name: hindsight-api
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hindsight-api.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: hindsight-api
                port:
                  number: 8888
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hindsight-api.josevictor.me
      secretName: wildcard-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-cp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-cp
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-cp
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: hindsight-cp
      app.kubernetes.io/name: hindsight-cp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: hindsight-cp
        app.kubernetes.io/name: hindsight-cp
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: HINDSIGHT_CP_DATAPLANE_API_URL
              value: http://hindsight-api:8888
            - name: HINDSIGHT_CP_HOSTNAME
              value: 0.0.0.0
            - name: HINDSIGHT_CP_PORT
              value: '3000'
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: hindsight-secrets
          image: ghcr.io/vectorize-io/hindsight-control-plane:0.8.1@sha256:c5f0a2f0c9d12984a8e7612d9797ca499e61ae312bbe2b8ead3e54ce36dac236
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: 3000
            timeoutSeconds: 5
          name: main
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
            tcpSocket:
              port: 3000
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: preemptible
      serviceAccountName: default
