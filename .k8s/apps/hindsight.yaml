apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: hindsight-api
      app.kubernetes.io/name: hindsight-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: hindsight-api
        app.kubernetes.io/name: hindsight-api
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_API_BASE
              value: https://openrouter.ai/api/v1
            - name: HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_MODEL
              value: openai/text-embedding-3-small
            - name: HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_OUTPUT_DIMENSIONS
              value: '384'
            - name: HINDSIGHT_API_EMBEDDINGS_PROVIDER
              value: litellm-sdk
            - name: HINDSIGHT_API_HOST
              value: 0.0.0.0
            - name: HINDSIGHT_API_LLM_MODEL
              value: openai/gpt-oss-20b
            - name: HINDSIGHT_API_LLM_PROVIDER
              value: openrouter
            - name: HINDSIGHT_API_PORT
              value: '8888'
            - name: HINDSIGHT_API_REFLECT_LLM_MODEL
              value: openai/gpt-oss-120b
            - name: HINDSIGHT_API_RERANKER_OPENROUTER_MODEL
              value: cohere/rerank-v3.5
            - name: HINDSIGHT_API_RERANKER_PROVIDER
              value: openrouter
            - name: HINDSIGHT_API_TEXT_SEARCH_EXTENSION
              value: native
            - name: HINDSIGHT_API_VECTOR_EXTENSION
              value: vchord
            - name: HINDSIGHT_API_WORKER_CONSOLIDATION_MAX_SLOTS
              value: '1'
            - name: HINDSIGHT_API_WORKER_MAX_SLOTS
              value: '2'
          envFrom:
            - secretRef:
                name: hindsight-secrets
          image: ghcr.io/vectorize-io/hindsight-api:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          name: main
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          startupProbe:
            failureThreshold: 18
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: preemptible
      serviceAccountName: default
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
    lbipam.cilium.io/ips: 10.10.10.145
    lbipam.cilium.io/sharing-key: hindsight-api
  labels:
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    app.kubernetes.io/service: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  ports:
    - name: http
      port: 8888
      protocol: TCP
      targetPort: 8888
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/name: hindsight-api
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hindsight-api.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: hindsight-api
                port:
                  number: 8888
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hindsight-api.josevictor.me
      secretName: wildcard-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-cp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-cp
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-cp
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: hindsight-cp
      app.kubernetes.io/name: hindsight-cp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: hindsight-cp
        app.kubernetes.io/name: hindsight-cp
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: HINDSIGHT_CP_DATAPLANE_API_URL
              value: http://hindsight-api:8888
            - name: HINDSIGHT_CP_HOSTNAME
              value: 0.0.0.0
            - name: HINDSIGHT_CP_PORT
              value: '3000'
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: hindsight-secrets
          image: ghcr.io/vectorize-io/hindsight-control-plane:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            tcpSocket:
              port: 3000
            timeoutSeconds: 5
          name: main
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
            tcpSocket:
              port: 3000
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: preemptible
      serviceAccountName: default
---
