apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: hindsight-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: hindsight-api
    helm.sh/chart: app-template-4.2.0
    kubenix/module-name: release
    kubenix/module-version: 1.0.0
  name: hindsight-api
  namespace: apps
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: hindsight-api
      app.kubernetes.io/name: hindsight-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: hindsight-api
        app.kubernetes.io/name: hindsight-api
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: HINDSIGHT_API_CONSOLIDATION_LLM_MAX_RETRIES
              value: '2'
            - name: HINDSIGHT_API_CONSOLIDATION_LLM_TIMEOUT
              value: '120'
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL
              value: https://openrouter.ai/api/v1
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL
              value: intfloat/multilingual-e5-large
            - name: HINDSIGHT_API_EMBEDDINGS_PROVIDER
              value: openai
            - name: HINDSIGHT_API_HOST
              value: 0.0.0.0
            - name: HINDSIGHT_API_LLM_BASE_URL
              value: https://omniroute.josevictor.me/v1
            - name: HINDSIGHT_API_LLM_MAX_CONCURRENT
              value: '2'
            - name: HINDSIGHT_API_LLM_MAX_RETRIES
              value: '2'
            - name: HINDSIGHT_API_LLM_MODEL
              value: pippin
            - name: HINDSIGHT_API_LLM_PROVIDER
              value: openai
            - name: HINDSIGHT_API_LLM_TIMEOUT
              value: '120'
            - name: HINDSIGHT_API_PORT
              value: '8888'
            - name: HINDSIGHT_API_REFLECT_LLM_MODEL
              value: haldir
            - name: HINDSIGHT_API_RERANKER_MAX_CANDIDATES
              value: '32'
            - name: HINDSIGHT_API_RERANKER_PROVIDER
              value: siliconflow
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_BASE_URL
              value: https://api.siliconflow.com/v1
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_MODEL
              value: Qwen/Qwen3-Reranker-0.6B
            - name: HINDSIGHT_API_RERANKER_SILICONFLOW_TIMEOUT
              value: '60'
            - name: HINDSIGHT_API_RETAIN_LLM_MAX_RETRIES
              value: '2'
            - name: HINDSIGHT_API_RETAIN_LLM_TIMEOUT
              value: '120'
            - name: HINDSIGHT_API_TEXT_SEARCH_EXTENSION
              value: native
            - name: HINDSIGHT_API_TEXT_SEARCH_EXTENSION_NATIVE_LANGUAGE
              value: portuguese
            - name: HINDSIGHT_API_VECTOR_EXTENSION
              value: pgvector
            - name: HINDSIGHT_API_WORKER_CONSOLIDATION_MAX_SLOTS
              value: '2'
            - name: HINDSIGHT_API_WORKER_MAX_SLOTS
              value: '8'
          envFrom:
            - secretRef:
                name: hindsight-secrets
          image: ghcr.io/vectorize-io/hindsight-api:0.8.3@sha256:dbf686c87ce8d541eb668c49184549fe94bf928c15c31cedba005c86a425d147
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          name: main
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 50m
              memory: 512Mi
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: preemptible
      serviceAccountName: default
---
