apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/version: 2026.7.0
    helm.sh/chart: home-assistant-0.3.68
  name: home-assistant
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: home-assistant
      app.kubernetes.io/name: home-assistant
  serviceName: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: home-assistant
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: home-assistant
        app.kubernetes.io/version: 2026.7.0
        helm.sh/chart: home-assistant-0.3.68
    spec:
      containers:
        - envFrom:
            - secretRef:
                name: home-assistant-secret
          image: ghcr.io/home-assistant/home-assistant:2026.7.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 2
          name: home-assistant
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          securityContext: {}
          volumeMounts:
            - mountPath: /config
              name: home-assistant
            - mountPath: /config/configuration.yaml
              name: home-assistant-config
              subPath: configuration.yaml
      initContainers:
        - command:
            - sh
            - -c
            - "set -e\nmkdir -p /config/custom_components\nif [ ! -d /config/custom_components/hacs\
              \ ]; then\n  echo \"Installing HACS 2.0.5...\"\n  wget -q https://github.com/hacs/integration/releases/download/2.0.5/hacs.zip\
              \ -O /tmp/hacs.zip\n  unzip -q /tmp/hacs.zip -d /config/custom_components/hacs\n\
              \  echo \"HACS installed\"\nelse\n  echo \"HACS already present, skipping\"\
              \nfi\n"
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          name: install-hacs
          volumeMounts:
            - mountPath: /config
              name: home-assistant
        - command:
            - sh
            - -c
            - "set -e\nmkdir -p /config/custom_components\nif [ ! -d /config/custom_components/auth_oidc\
              \ ]; then\n  echo \"Installing hass-oidc-auth 1.1.1...\"\n  wget -q\
              \ https://github.com/christiaangoossens/hass-oidc-auth/releases/download/v1.1.1/hass-oidc-auth.zip\
              \ -O /tmp/auth_oidc.zip\n  mkdir -p /config/custom_components/auth_oidc\n\
              \  unzip -q /tmp/auth_oidc.zip -d /config/custom_components/auth_oidc\n\
              \  echo \"hass-oidc-auth installed\"\nelse\n  echo \"hass-oidc-auth\
              \ already present, skipping\"\nfi\n"
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          name: install-oidc
          volumeMounts:
            - mountPath: /config
              name: home-assistant
      securityContext: {}
      serviceAccountName: home-assistant
      volumes:
        - configMap:
            name: home-assistant-config
          name: home-assistant-config
  volumeClaimTemplates:
    - metadata:
        name: home-assistant
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: rook-ceph-block
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/version: 2026.7.0
    helm.sh/chart: home-assistant-0.3.68
  name: home-assistant
  namespace: apps
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/version: 2026.7.0
    helm.sh/chart: home-assistant-0.3.68
  name: home-assistant
  namespace: apps
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  labels:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/version: 2026.7.0
    helm.sh/chart: home-assistant-0.3.68
  name: home-assistant
  namespace: apps
spec:
  ingressClassName: cilium
  rules:
    - host: hass.josevictor.me
      http:
        paths:
          - backend:
              service:
                name: home-assistant
                port:
                  number: 8080
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - hass.josevictor.me
      secretName: wildcard-tls
