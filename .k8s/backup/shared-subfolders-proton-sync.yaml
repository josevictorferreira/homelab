apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: shared-subfolders-proton-sync
  namespace: backup
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 2
      template:
        spec:
          containers:
            - args:
                - "    set -euo pipefail\n\n    cleanup() {\n      echo \"Cleaning\
                  \ up temp files...\"\n      rm -f /tmp/proton-backup-*.tar.gz /tmp/proton-backup-*.tar.gz.gpg\n\
                  \    }\n    trap cleanup EXIT\n\n    DATE=\"$(date +%Y-%m-%d)\"\n\
                  \    TIMESTAMP=\"$(date +%Y%m%d_%H%M%S)\"\n    MANIFEST_FILE=\"\
                  manifest-$DATE.json\"\n\n    SOURCE_ROOT=\"/shared\"\n\n    echo\
                  \ \"=== Starting Proton Drive shared subfolders backup (tar.gz +\
                  \ gpg + rclone copy) ===\"\n    echo \"Date: $DATE\"\n    echo \"\
                  Timestamp: $TIMESTAMP\"\n    echo \"Folders to backup: 3d-models\
                  \ backups books images hermes mel-dynamica notetaking openclaw personal-finances\"\
                  \n    echo \"Destination: proton:Backups/homelab/shared-archives/current/\"\
                  \n\n    # Ensure rclone config directory exists\n    mkdir -p \"\
                  $HOME/.config/rclone\"\n\n    # Check if proton configuration exists,\
                  \ if not create it\n    if ! grep -q \"\\[proton\\]\" \"$HOME/.config/rclone/rclone.conf\"\
                  \ 2>/dev/null; then\n      echo \"Setting up initial Proton Drive\
                  \ rclone config...\"\n      OBSCURED_PASS=\"$(rclone obscure \"\
                  $PROTON_PASSWORD\")\"\n      cat >> \"$HOME/.config/rclone/rclone.conf\"\
                  \ <<RCLONE_EOF\n[proton]\ntype = protondrive\nusername = $PROTON_USERNAME\n\
                  password = $OBSCURED_PASS\nRCLONE_EOF\n    fi\n\n    # Ensure destination\
                  \ exists\n    echo \"Ensuring remote directory exists...\"\n   \
                  \ rclone mkdir \"proton:Backups/homelab/shared-archives\" || true\n\
                  \n    # Generate manifest header\n    echo \"Generating manifest...\"\
                  \n    MANIFEST_JSON=\"$MANIFEST_FILE.json.tmp\"\n    {\n      echo\
                  \ \"{\"\n      echo \"  \\\"backup_date\\\": \\\"$DATE\\\",\"\n\
                  \      echo \"  \\\"timestamp\\\": \\\"$TIMESTAMP\\\",\"\n     \
                  \ echo \"  \\\"source_root\\\": \\\"/shared\\\",\"\n      echo \"\
                  \  \\\"method\\\": \\\"tar.gz-gpg-rclone-copy\\\",\"\n      echo\
                  \ \"  \\\"destination\\\": \\\"proton:Backups/homelab/shared-archives/current/\\\
                  \",\"\n      echo \"  \\\"folders\\\": [\"3d-models\",\"backups\"\
                  ,\"books\",\"images\",\"hermes\",\"mel-dynamica\",\"notetaking\"\
                  ,\"openclaw\",\"personal-finances\"],\n      echo \"  \\\"archives\\\
                  \": [\"\n    } > \"$MANIFEST_JSON\"\n\n    FIRST_ARCHIVE=true\n\
                  \    for folder in 3d-models backups books images hermes mel-dynamica\
                  \ notetaking openclaw personal-finances; do\n      if [ -d \"$SOURCE_ROOT/$folder\"\
                  \ ]; then\n        echo \"Processing folder: $folder\"\n       \
                  \ ARCHIVE_BASE=\"/tmp/proton-backup-$TIMESTAMP-$folder\"\n     \
                  \   TAR_FILE=\"$ARCHIVE_BASE.tar.gz\"\n        ENC_FILE=\"$TAR_FILE.gpg\"\
                  \n\n        # Create tar.gz archive\n        echo \"  Creating archive...\"\
                  \n        tar czf \"$TAR_FILE\" -C \"$SOURCE_ROOT\" \"$folder\"\n\
                  \n        # Encrypt with gpg\n        echo \"  Encrypting...\"\n\
                  \        gpg --batch --yes --passphrase \"$ENCRYPTION_PASSWORD\"\
                  \ --symmetric --cipher-algo AES256 \"$TAR_FILE\"\n\n        # Upload\
                  \ encrypted archive\n        echo \"  Uploading...\"\n        rclone\
                  \ copy \"$ENC_FILE\" \"proton:Backups/homelab/shared-archives/current/\"\
                  \n\n        # Record in manifest\n        ARCHIVE_SIZE=$(stat -c%s\
                  \ \"$ENC_FILE\" 2>/dev/null || echo 0)\n        if [ \"$FIRST_ARCHIVE\"\
                  \ = true ]; then\n          FIRST_ARCHIVE=false\n          echo\
                  \ \"    {\\\"folder\\\": \\\"$folder\\\", \\\"archive\\\": \\\"\
                  $folder.tar.gz.gpg\\\", \\\"encrypted_size\\\": $ARCHIVE_SIZE}\"\
                  \ >> \"$MANIFEST_JSON\"\n        else\n          echo \"    ,{\\\
                  \"folder\\\": \\\"$folder\\\", \\\"archive\\\": \\\"$folder.tar.gz.gpg\\\
                  \", \\\"encrypted_size\\\": $ARCHIVE_SIZE}\" >> \"$MANIFEST_JSON\"\
                  \n        fi\n\n        # Clean up temp files for this folder\n\
                  \        rm -f \"$TAR_FILE\" \"$ENC_FILE\"\n        echo \"  Done:\
                  \ $folder\"\n      else\n        echo \"Warning: folder $folder\
                  \ not found, skipping\"\n      fi\n    done\n\n    {\n      echo\
                  \ \"  ],\"\n      echo \"  \\\"encryption\\\": \\\"gpg-symmetric-aes256\\\
                  \",\"\n      echo \"  \\\"exclusions\\\": [\\\".DS_Store\\\", \\\
                  \"Thumbs.db\\\"]\"\n      echo \"}\"\n    } >> \"$MANIFEST_JSON\"\
                  \n\n    mv \"$MANIFEST_JSON\" \"$MANIFEST_FILE\"\n\n    # Upload\
                  \ manifest\n    echo \"Uploading manifest...\"\n    rclone copy\
                  \ \"$MANIFEST_FILE\" \"proton:Backups/homelab/shared-archives/manifests/\"\
                  \n\n    # Clean up manifest\n    rm -f \"$MANIFEST_FILE\"\n\n  \
                  \  echo \"=== Proton Drive Backup completed successfully ===\"\n\
                  \    echo \"Destination: proton:Backups/homelab/shared-archives/current/\"\
                  \n    echo \"Manifest: proton:Backups/homelab/shared-archives/manifests/$MANIFEST_FILE\"\
                  \n"
              command:
                - bash
                - -c
              env:
                - name: HOME
                  value: /root
                - name: PROTON_DEST_PATH
                  value: homelab/shared-archives
                - name: PROTON_USERNAME
                  valueFrom:
                    secretKeyRef:
                      key: PROTON_USERNAME
                      name: shared-subfolders-proton-sync-config
                - name: PROTON_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: PROTON_PASSWORD
                      name: shared-subfolders-proton-sync-config
                - name: ENCRYPTION_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: ENCRYPTION_PASSWORD
                      name: shared-subfolders-proton-sync-config
              image: ghcr.io/josevictorferreira/backup-toolbox@sha256:541cc695cd9ab09f5a82b4b85b01f6aa396e3146bdc8bdf1071f1bc3ed00cdda
              name: proton-sync
              resources:
                limits:
                  cpu: 500m
                  ephemeral-storage: 5Gi
                  memory: 1Gi
                requests:
                  cpu: 100m
                  ephemeral-storage: 1Gi
                  memory: 256Mi
              volumeMounts:
                - mountPath: /shared
                  name: shared-storage
                  readOnly: true
                - mountPath: /root/.config/rclone
                  name: proton-config
                - mountPath: /root/.cache/rclone
                  name: proton-cache
          imagePullSecrets:
            - name: ghcr-registry-secret
          restartPolicy: OnFailure
          volumes:
            - name: shared-storage
              persistentVolumeClaim:
                claimName: cephfs-shared-storage-root
            - name: proton-config
              persistentVolumeClaim:
                claimName: shared-subfolders-proton-sync-config
            - name: proton-cache
              persistentVolumeClaim:
                claimName: shared-subfolders-proton-sync-state
  schedule: 0 3 * * *
  successfulJobsHistoryLimit: 3
  timeZone: America/Sao_Paulo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: shared-subfolders-proton-sync-config
  namespace: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-ceph-block
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    kubenix/k8s-version: '1.32'
    kubenix/project-name: ze-homelab
  name: shared-subfolders-proton-sync-state
  namespace: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: rook-ceph-block
